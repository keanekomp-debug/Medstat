<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ANVISA Portfolio Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter,Arial;
background:#0f172a;
color:white;
padding:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:18px;
max-width:1000px;
}

textarea{
width:100%;
height:150px;
background:#020617;
color:#22c55e;
border:none;
padding:12px;
border-radius:12px;
}

button{
background:#22c55e;
border:none;
padding:12px 22px;
border-radius:10px;
font-weight:600;
cursor:pointer;
margin-top:12px;
margin-right:8px;
}

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #1f2937;
}

</style>

</head>

<body>

<div class="card">

<h2>🇧🇷 ANVISA Portfolio Intelligence V3</h2>

<textarea id="input">
vonoprazana
empagliflozina + metformina
ácido obeticólico
bilastina
mirogabalina
</textarea>

<br>

<button onclick="run()">Run Scan</button>
<button onclick="exportCSV()">Export CSV</button>

<table id="out"></table>

<h3>Dosage Form Saturation</h3>
<canvas id="formChart"></canvas>

<h3>MAH Concentration</h3>
<canvas id="mahChart"></canvas>

<h3>Top Entry Targets</h3>
<div id="recommend"></div>

</div>

<script>

const BASE="https://consultas.anvisa.gov.br/api/consulta/medicamentos"

let globalResults=[]

function proxy(u){
return "https://api.allorigins.win/raw?url="+encodeURIComponent(u)
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function scan(term){

let page=0
let total=0
let mah={}
let forms=new Set()
let plants=new Set()

while(true){

let url=`${BASE}?nomePrincipioAtivo=${encodeURIComponent(term)}&page=${page}&size=100`

let r=await fetch(proxy(url))
let j=await r.json()

if(page===0) total=j.totalElements

if(!j.content || j.content.length===0) break

for(let item of j.content){

if(item.empresa){

let n=item.empresa.razaoSocial

mah[n]=(mah[n]||0)+1

}

if(item.formaFarmaceutica) forms.add(item.formaFarmaceutica)

if(item.localFabricacao) plants.add(item.localFabricacao)

}

page++

if(page*100>=total) break

await sleep(250)

}

return{
total,
mah,
forms:[...forms],
plants:[...plants]
}

}

function score(r){

let s=0

if(r.total<=3) s+=40
else if(r.total<=10) s+=25
else if(r.total<=30) s+=10

if(Object.keys(r.mah).length<=2) s+=20
if(r.forms.length<=2) s+=10
if(r.plants.length<=3) s+=10

return s

}

async function run(){

globalResults=[]

let lines=document.getElementById("input").value.split("\n")

let table=document.getElementById("out")

table.innerHTML="<tr><th>Molecule</th><th>Regs</th><th>MAHs</th><th>Forms</th><th>Plants</th><th>Score</th></tr>"

for(let l of lines){

l=l.trim()

if(!l) continue

let r=await scan(l)

r.name=l
r.score=score(r)

globalResults.push(r)

}

globalResults.sort((a,b)=>b.score-a.score)

for(let r of globalResults){

table.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.total}</td>
<td>${Object.keys(r.mah).length}</td>
<td>${r.forms.length}</td>
<td>${r.plants.length}</td>
<td>${r.score}</td>
</tr>
`

}

buildCharts()
buildRecommendations()

}

function buildCharts(){

let labels=globalResults.map(x=>x.name)
let formData=globalResults.map(x=>x.forms.length)
let mahData=globalResults.map(x=>Object.keys(x.mah).length)

new Chart(formChart,{
type:"bar",
data:{labels,datasets:[{label:"Dosage Forms",data:formData}]}
})

new Chart(mahChart,{
type:"pie",
data:{labels,datasets:[{data:mahData}]}
})

}

function buildRecommendations(){

let div=document.getElementById("recommend")

div.innerHTML=""

let top=globalResults.slice(0,3)

for(let t of top){

div.innerHTML+=`⭐ ${t.name} (score ${t.score})<br>`

}

}

function exportCSV(){

let rows=["Molecule,Registrations,MAHs,Forms,Plants,Score"]

for(let r of globalResults){

rows.push(`${r.name},${r.total},${Object.keys(r.mah).length},${r.forms.length},${r.plants.length},${r.score}`)

}

let blob=new Blob([rows.join("\n")])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="anvisa_portfolio.csv"

a.click()

}

</script>

</body>
</html>
