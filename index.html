<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600&display=swap" rel="stylesheet">

<title>Brazil Pharma Portfolio Intelligence</title>

<style>

body{
font-family:Figtree;
background:#f3f4f6;
color:#111;
padding:30px;
transition:.3s;
}

.dark{
background:#0f172a;
color:white;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

.dark .card{
background:#111827;
}

textarea{
width:100%;
height:140px;
margin-top:10px;
}

button{
background:#22c55e;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.badge{
padding:4px 10px;
border-radius:999px;
font-size:12px;
}

.good{background:#bbf7d0}
.mid{background:#fde68a}
.bad{background:#fecaca}

</style>

</head>

<body>

<button onclick="toggle()">🌙 Toggle Mode</button>

<div class="card">

<h2>Paste Molecules</h2>

<textarea id="inns">
vonoprazana
empagliflozina
bilastina
</textarea>

</div>

<div class="card">

<h2>Paste ANVISA Dataset</h2>

<textarea id="dataset"></textarea>

<button onclick="run()">Analyse Portfolio</button>

</div>

<div class="card">

<table id="out"></table>

</div>

<script>

function toggle(){
document.body.classList.toggle("dark")
}

function parseDataset(){

let text=document.getElementById("dataset").value

let rows=text.split("\n")

let data=[]

for(let r of rows){

let c=r.split("\t")

data.push({
mol:c[2],
mah:c[5],
form:c[8],
plant:c[12]
})

}

return data

}

function score(reg,mah,form,plant){

let s=0

if(reg<=3)s+=40
else if(reg<=10)s+=25
else if(reg<=30)s+=10

if(mah<=2)s+=20
if(form<=2)s+=10
if(plant<=3)s+=10

return s

}

function badge(s){

if(s>=60)return `<span class="badge good">HIGH</span>`
if(s>=35)return `<span class="badge mid">MODERATE</span>`
return `<span class="badge bad">LOW</span>`

}

function run(){

let data=parseDataset()

let mols=document.getElementById("inns").value.split("\n")

let table=document.getElementById("out")

table.innerHTML="<tr><th>Molecule</th><th>Regs</th><th>MAH</th><th>Forms</th><th>Plants</th><th>Score</th><th>Opportunity</th></tr>"

for(let m of mols){

m=m.trim()

if(!m)continue

let rows=data.filter(x=>x.mol && x.mol.toLowerCase().includes(m.toLowerCase()))

let regs=rows.length

let mah=new Set(rows.map(x=>x.mah))
let forms=new Set(rows.map(x=>x.form))
let plants=new Set(rows.map(x=>x.plant))

let s=score(regs,mah.size,forms.size,plants.size)

table.innerHTML+=`
<tr>
<td>${m}</td>
<td>${regs}</td>
<td>${mah.size}</td>
<td>${forms.size}</td>
<td>${plants.size}</td>
<td>${s}</td>
<td>${badge(s)}</td>
</tr>
`

}

}

</script>

</body>
</html>
