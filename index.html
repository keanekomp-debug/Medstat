<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ANVISA Market Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:30px;
}

textarea{
width:100%;
height:150px;
background:black;
color:#22c55e;
padding:10px;
}

button{
background:#22c55e;
padding:10px 20px;
border:none;
margin-top:10px;
cursor:pointer;
}

#status{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:10px;
font-size:13px;
height:120px;
overflow:auto;
}

.good{color:#4ade80}
.bad{color:#f87171}
.mid{color:#facc15}

</style>

</head>

<body>

<h2>🇧🇷 ANVISA Market Intelligence Engine</h2>

<textarea id="input">
vonoprazana
empagliflozina
bilastina
</textarea>

<br>

<button onclick="run()">RUN SCAN</button>

<br><br>

Load CMED Price XLS:
<input type="file" id="priceFile">

<br><br>

Load Procurement CSV:
<input type="file" id="buyFile">

<div id="status"></div>

<table id="out"></table>

<script>

const BASE="https://consultas.anvisa.gov.br/api/consulta/medicamentos"

let priceData=[]
let buyData=[]

function log(msg,cls="mid"){
document.getElementById("status").innerHTML+=`<div class="${cls}">${msg}</div>`
}

function proxy(u){
return "https://corsproxy.io/?"+encodeURIComponent(u)
}

async function scanMol(mol){

log("Scanning "+mol)

let page=0
let total=0

while(true){

let url=`${BASE}?nomePrincipioAtivo=${encodeURIComponent(mol)}&page=${page}&size=100`

try{

let r=await fetch(proxy(url))

if(!r.ok) throw "fetch fail"

let j=await r.json()

if(page===0) total=j.totalElements

if(!j.content || j.content.length===0) break

page++

if(page*100>=total) break

}catch(e){

log("FAILED "+mol,"bad")
return {mol,total:0,fail:true}

}

}

log("DONE "+mol+" regs="+total,"good")

return {mol,total}

}

function matchPrice(mol){

let rows=priceData.filter(x=>x.principio && x.principio.toLowerCase().includes(mol.toLowerCase()))

if(rows.length===0) return null

let avg=rows.reduce((a,b)=>a+Number(b.pmc||0),0)/rows.length

return avg.toFixed(2)

}

function matchBuy(mol){

let rows=buyData.filter(x=>x.objeto && x.objeto.toLowerCase().includes(mol.toLowerCase()))

let total=rows.reduce((a,b)=>a+Number(b.valor||0),0)

return total

}

async function run(){

document.getElementById("status").innerHTML=""

let lines=document.getElementById("input").value.split("\n")

let table=document.getElementById("out")

table.innerHTML="<tr><th>Molecule</th><th>Registrations</th><th>Avg PMC</th><th>Gov Market</th></tr>"

for(let l of lines){

l=l.trim()

if(!l) continue

let r=await scanMol(l)

let price=matchPrice(l)
let buy=matchBuy(l)

table.innerHTML+=`
<tr>
<td>${l}</td>
<td>${r.total}</td>
<td>${price||"-"}</td>
<td>${buy||"-"}</td>
</tr>
`

}

}

document.getElementById("priceFile").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(evt){

let wb=XLSX.read(evt.target.result,{type:"binary"})

let sheet=wb.Sheets[wb.SheetNames[0]]

priceData=XLSX.utils.sheet_to_json(sheet)

log("Price file loaded "+priceData.length+" rows","good")

}

reader.readAsBinaryString(file)

})

document.getElementById("buyFile").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(evt){

let text=evt.target.result

buyData=text.split("\n").map(x=>{

let p=x.split(",")

return {objeto:p[3],valor:p[5]}

})

log("Procurement file loaded","good")

}

reader.readAsText(file)

})

</script>

</body>
</html>
