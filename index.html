<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ANVISA Molecule Intelligence PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#0f172a;
color:white;
padding:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
max-width:900px;
}

textarea{
width:100%;
height:160px;
background:#020617;
color:#22c55e;
border:none;
padding:15px;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:12px 22px;
border-radius:10px;
font-weight:600;
cursor:pointer;
margin-top:15px;
}

button:hover{background:#16a34a}

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

th{
text-align:left;
background:#1f2937;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #1f2937;
}

.badge{
padding:5px 10px;
border-radius:999px;
font-size:12px;
}

.high{background:#166534}
.mid{background:#92400e}
.low{background:#7f1d1d}

.loader{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="card">

<h2>🇧🇷 ANVISA Molecule Intelligence PRO</h2>

<textarea id="input">
vonoprazana
empagliflozina + metformina
ácido obeticólico
bilastina
mirogabalina
</textarea>

<button onclick="run()">Run Portfolio Scan</button>

<div class="loader" id="loader">Scanning ANVISA database…</div>

<table id="out"></table>

</div>

<script>

const BASE="https://consultas.anvisa.gov.br/api/consulta/medicamentos"

function proxy(url){
return "https://api.allorigins.win/raw?url="+encodeURIComponent(url)
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function scan(term){

let page=0
let total=0
let mah=new Set()
let forms=new Set()
let plants=new Set()
let earliest=9999

while(true){

let url=`${BASE}?nomePrincipioAtivo=${encodeURIComponent(term)}&page=${page}&size=100`

let r=await fetch(proxy(url))

let j=await r.json()

if(page===0) total=j.totalElements

if(!j.content || j.content.length===0) break

for(let item of j.content){

if(item.empresa) mah.add(item.empresa.razaoSocial)

if(item.formaFarmaceutica) forms.add(item.formaFarmaceutica)

if(item.localFabricacao) plants.add(item.localFabricacao)

if(item.dataVencimento){

let y=parseInt(item.dataVencimento.substring(0,4))

if(y<earliest) earliest=y

}

}

page++

if(page*100>=total) break

await sleep(300)

}

return{
total,
mah:[...mah],
forms:[...forms],
plants:[...plants],
earliest
}

}

function score(d){

let s=0

if(d.total<=3) s+=40
else if(d.total<=10) s+=25
else if(d.total<=30) s+=12
else s+=4

if(d.mah.length<=2) s+=20
else if(d.mah.length<=5) s+=10

if(d.forms.length<=2) s+=10

if(d.plants.length<=3) s+=10

if(d.earliest>=2022) s+=10

return s

}

function badge(s){

if(s>=60) return `<span class="badge high">HIGH OPPORTUNITY</span>`
if(s>=35) return `<span class="badge mid">MODERATE</span>`
return `<span class="badge low">SATURATED</span>`

}

async function run(){

document.getElementById("loader").style.display="block"

let lines=document.getElementById("input").value.split("\n")

let table=document.getElementById("out")

table.innerHTML="<tr><th>INN</th><th>Regs</th><th>MAHs</th><th>Forms</th><th>Plants</th><th>Score</th><th>Opportunity</th></tr>"

for(let l of lines){

l=l.trim()

if(!l) continue

let result={total:0,mah:[],forms:[],plants:[],earliest:9999}

if(l.includes("+")){

let parts=l.split("+")

for(let p of parts){

let d=await scan(p.trim())

result.total+=d.total
result.mah=result.mah.concat(d.mah)
result.forms=result.forms.concat(d.forms)
result.plants=result.plants.concat(d.plants)
if(d.earliest<result.earliest) result.earliest=d.earliest

}

}else{

result=await scan(l)

}

let sc=score(result)

table.innerHTML+=`
<tr>
<td>${l}</td>
<td>${result.total}</td>
<td>${result.mah.length}</td>
<td>${result.forms.length}</td>
<td>${result.plants.length}</td>
<td>${sc}</td>
<td>${badge(sc)}</td>
</tr>
`

}

document.getElementById("loader").style.display="none"

}

</script>

</body>
</html>
