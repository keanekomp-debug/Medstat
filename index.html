<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ANVISA Molecule Intelligence PRO</title>

<style>
body{font-family:Arial;padding:20px}
textarea{width:420px;height:180px}
table{border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #ccc;padding:6px}
.good{background:#c8f7c5}
.mid{background:#fff3b0}
.bad{background:#f7c5c5}
</style>

</head>

<body>

<h2>ANVISA Molecule Intelligence PRO</h2>

Paste Brazil DCB INNs (one per line)

<br><br>

<textarea id="input">
vonoprazana
empagliflozina + metformina
ácido obeticólico
bilastina
mirogabalina
</textarea>

<br><br>

<button onclick="run()">RUN SCAN</button>

<table id="out"></table>

<script>

const BASE="https://consultas.anvisa.gov.br/api/consulta/medicamentos"

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function scanSingle(term){

let page=0
let total=0
let mah=new Set()
let forms=new Set()
let plants=new Set()
let earliest=9999

while(true){

let url=`${BASE}?nomePrincipioAtivo=${encodeURIComponent(term)}&page=${page}&size=100`

let r=await fetch(url)
let j=await r.json()

if(page===0) total=j.totalElements

if(!j.content || j.content.length===0) break

for(let item of j.content){

if(item.empresa) mah.add(item.empresa.razaoSocial)

if(item.formaFarmaceutica) forms.add(item.formaFarmaceutica)

if(item.localFabricacao) plants.add(item.localFabricacao)

if(item.dataVencimento){

let y=parseInt(item.dataVencimento.substring(0,4))

if(y<earliest) earliest=y

}

}

page++

if(page*100>=total) break

await sleep(250)

}

return{
total,
mah:[...mah],
forms:[...forms],
plants:[...plants],
earliest
}

}

function attractiveness(d){

let score=0

if(d.total<=3) score+=40
else if(d.total<=10) score+=30
else if(d.total<=30) score+=15
else score+=5

let mahc=d.mah.length

if(mahc<=2) score+=20
else if(mahc<=5) score+=12
else score+=5

if(d.forms.length<=2) score+=15
else score+=5

if(d.plants.length<=3) score+=10
else score+=4

if(d.earliest>=2022) score+=15
else if(d.earliest>=2018) score+=8
else score+=3

return score

}

function recommendation(score){

if(score>=70) return "⭐ HIGH OPPORTUNITY"
if(score>=45) return "⚠️ MODERATE"
return "🔴 SATURATED"

}

async function run(){

let lines=document.getElementById("input").value.split("\n")

let table=document.getElementById("out")

table.innerHTML="<tr><th>INN</th><th>Registrations</th><th>MAHs</th><th>Dosage Forms</th><th>Manufacture Sites</th><th>Earliest Expiry</th><th>Score</th><th>Recommendation</th></tr>"

for(let l of lines){

l=l.trim()

if(!l) continue

let result={total:0,mah:[],forms:[],plants:[],earliest:9999}

if(l.includes("+")){

let parts=l.split("+")

for(let p of parts){

let d=await scanSingle(p.trim())

result.total+=d.total
d.mah.forEach(x=>result.mah.push(x))
d.forms.forEach(x=>result.forms.push(x))
d.plants.forEach(x=>result.plants.push(x))
if(d.earliest<result.earliest) result.earliest=d.earliest

}

}else{

result=await scanSingle(l)

}

let score=attractiveness(result)

let rec=recommendation(score)

let cls= score>=70 ? "good" : score>=45 ? "mid":"bad"

table.innerHTML+=`
<tr class="${cls}">
<td>${l}</td>
<td>${result.total}</td>
<td>${result.mah.length}</td>
<td>${result.forms.join(", ")}</td>
<td>${result.plants.join(", ")}</td>
<td>${result.earliest}</td>
<td>${score}</td>
<td>${rec}</td>
</tr>
`

}

}

</script>

</body>
</html>
